use_default_settings: true

general:
  instance_name: "Nautil Search"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "zh-CN"
  formats:
    - html
    - json

server:
  secret_key: "nautil-searxng-secret-change-me"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false

redis:
  url: "redis://redis:6379/0"

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
